<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Wallet Signup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1 class="title">Create Your Wallet</h1>

  <form id="signupForm">
    <div class="input-group">
      <label>Full Name</label>
      <input type="text" required placeholder="NAME IN UPPERCASE">
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" required placeholder="YOUR WORKING EMAIL">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="YOUR PASSWORD">
    </div>

    <div class="input-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" required placeholder="CONFIRM YOUR PASSWORD">
    </div>

    <button type="submit" class="btn">Create Wallet</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
